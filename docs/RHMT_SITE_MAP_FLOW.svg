  <rect x="629" y="505" width="118" height="40" rx="6" class="patient-node" />
  <text x="688" y="530" text-anchor="middle" class="leaf-text">Dark mode</text>
  <rect x="629" y="570" width="118" height="40" rx="6" class="patient-node" />
  <text x="688" y="595" text-anchor="middle" class="leaf-text">DND</text>
  <rect x="629" y="635" width="118" height="40" rx="6" class="patient-node" />
