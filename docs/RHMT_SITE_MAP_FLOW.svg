<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RHMT Flow Site Map</title>
  <desc id="desc">Dark flow-style site map for the Remote Health Monitoring Tool showing public entry, patient application, and clinical admin application.</desc>
  <defs>
    <style>
      .bg { fill: #1f2020; }
      .title { font: 800 28px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 600 14px Arial, sans-serif; fill: #aeb8c4; }
      .gateway { fill: #525252; stroke: #a3a3a3; stroke-width: 2; }
      .gateway-title { font: 800 18px Arial, sans-serif; fill: #ffffff; }
      .gateway-text { font: 600 13px Arial, sans-serif; fill: #d4d4d4; }
      .branch-label { font: 800 14px Arial, sans-serif; fill: #f1f5f9; }
      .patient-head { fill: #0f624f; stroke: #10b981; stroke-width: 2; }
      .clinical-head { fill: #4b3f95; stroke: #8b7cf6; stroke-width: 2; }
      .head-text { font: 800 20px Arial, sans-serif; fill: #eafdf7; }
      .patient-node { fill: #0c5f4e; stroke: #13b981; stroke-width: 2; }
      .clinical-node { fill: #4d4693; stroke: #8b7cf6; stroke-width: 2; }
      .node-text { font: 800 15px Arial, sans-serif; fill: #f8fafc; }
      .leaf-text { font: 700 13px Arial, sans-serif; fill: #dffcf2; }
      .clinical-leaf-text { font: 700 13px Arial, sans-serif; fill: #ece9ff; }
      .line { stroke: #a3a3a3; stroke-width: 2.3; fill: none; }
      .line-soft { stroke: #737373; stroke-width: 1.8; fill: none; }
      .patient-line { stroke: #10b981; stroke-width: 1.9; fill: none; opacity: .75; }
      .clinical-line { stroke: #8b7cf6; stroke-width: 1.9; fill: none; opacity: .75; }
      .note { fill: #2f3030; stroke: #525252; stroke-width: 1.5; }
      .note-title { font: 800 15px Arial, sans-serif; fill: #f8fafc; }
      .note-text { font: 600 12px Arial, sans-serif; fill: #cbd5e1; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a3a3a3" />
    </marker>
    <marker id="patientArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#10b981" />
    </marker>
    <marker id="clinicalArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#8b7cf6" />
    </marker>
  </defs>

  <rect width="1600" height="980" class="bg" />
  <text x="80" y="58" class="title">Remote Health Monitoring Tool - Site Map</text>
  <text x="80" y="84" class="subtitle">Actual project flow: React Native Expo frontend, Django REST API, JWT authentication, Django ORM database, AsyncStorage offline queue</text>

  <!-- Public entry -->
  <rect x="620" y="118" width="360" height="74" rx="8" class="gateway" />
  <text x="800" y="148" text-anchor="middle" class="gateway-title">Public entry gateway</text>
  <text x="800" y="171" text-anchor="middle" class="gateway-text">Login | Register | Recover account notice</text>

  <!-- Branch labels and lines -->
  <path d="M740 192 L472 268" class="line" marker-end="url(#arrow)" />
  <path d="M860 192 L1128 268" class="line" marker-end="url(#arrow)" />
  <text x="512" y="246" class="branch-label">Patient</text>
  <text x="1030" y="246" class="branch-label">Doctor / Admin</text>

  <!-- App headers -->
