  <text x="430" y="321" text-anchor="middle" class="head-text">Patient application</text>

  <rect x="890" y="285" width="560" height="58" rx="8" class="clinical-head" />
  <text x="1170" y="321" text-anchor="middle" class="head-text">Clinical &amp; admin application</text>

